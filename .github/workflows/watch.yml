name: Vigilar disponibilidad (DWC Terra)

on:
  schedule:
    # Cada 5 minutos (en hora UTC). Es el mínimo que permite GitHub; además puede
    # retrasar los cron unos minutos cuando hay mucha carga.
    - cron: "*/5 * * * *"
    # Latido diario a las 08:00 UTC = 10:00 en España (horario de verano; en
    # invierno llegará a las 09:00 porque el cron de GitHub va siempre en UTC).
    - cron: "0 8 * * *"
  workflow_dispatch: # permite lanzarlo manualmente desde la pestaña Actions
    inputs:
      test:
        description: "Enviar los mensajes de prueba de disponibilidad (10)"
        type: boolean
        default: false
      heartbeat:
        description: "Enviar un latido de prueba"
        type: boolean
        default: false
      error_test:
        description: "Enviar un aviso de error de prueba"
        type: boolean
        default: false

permissions:
  contents: write # necesario para guardar state.json cuando cambie el estado

concurrency:
  group: watch-dwc
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Comprobar disponibilidad
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_TEST: ${{ inputs.test }}
          # true en el cron del latido diario (10:00 España) o si se pide a mano
          HEARTBEAT: ${{ github.event.schedule == '0 8 * * *' || inputs.heartbeat }}
          ERROR_TEST: ${{ inputs.error_test }}
        run: python checker.py

      # Vigilancia del newsletter por correo. Queda inactivo mientras no existan
      # los secretos IMAP_USER / IMAP_PASSWORD (no falla, simplemente no hace nada).
      - name: Revisar correo (newsletter)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          # Opcionales: para proveedores distintos de Gmail (Outlook, Yahoo, etc.)
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_MAILBOXES: ${{ secrets.IMAP_MAILBOXES }}
        run: python email_checker.py

      # Se ejecuta SIEMPRE (aunque un paso anterior falle) para que los contadores
      # de errores (fail_streak) se guarden entre ejecuciones. Reintenta el push
      # con rebase para evitar choques cuando dos ejecuciones coinciden.
      - name: Guardar estado si cambió
        if: always()
        run: |
          git add state.json
          [ -f email_state.json ] && git add email_state.json
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: actualizar estado [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "reintentando push ($i)..."; sleep 3
            done
          else
            echo "Sin cambios de estado."
          fi
